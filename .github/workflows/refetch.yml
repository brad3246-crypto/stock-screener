name: Quarterly DART refetch

# 분기 실적시즌(3·5·8·11월 25일 09:00 UTC = 18:00 KST) 자동 재수집.
# 수동 실행도 가능(Actions 탭 → Run workflow).
on:
  schedule:
    - cron: "0 9 25 3,5,8,11 *"
  workflow_dispatch:

permissions:
  contents: write   # 갱신된 parquet 커밋용

jobs:
  refetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"   # OpenDartReader 0.3.2 requires >=3.13

      - name: Install deps
        run: pip install -r requirements-fetch.txt

      - name: Fetch DART financials
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python -m screener.fetch --force

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fundamentals.parquet data/universe.parquet
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "chore: 분기 재무 데이터 자동 갱신 ($(date -u +%Y-%m-%d))"
            git push
          fi
